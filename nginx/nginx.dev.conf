server {
    listen 80;
    server_name localhost;

    # Bot detection for prerendering
    set $prerender 0;
    if ($http_user_agent ~* "googlebot|bingbot|yandexbot|baiduspider|facebookexternalhit|twitterbot|linkedinbot|whatsapp|slackbot|telegrambot|applebot|discordbot") {
        set $prerender 1;
    }
    if ($uri ~* "\.(js|css|xml|json|jpg|jpeg|png|webp|svg|ico|woff2?|txt)$") {
        set $prerender 0;
    }
    if ($uri ~* "^/(api|images|assets)/") {
        set $prerender 0;
    }

    # Frontend (Vite dev server with HMR)
    location / {
        if ($prerender = 1) {
            rewrite ^(.*)$ /api/prerender?path=$1 last;
        }
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://backend:8000/api/sitemap.xml;
        proxy_set_header Host $host;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # Uploaded images (local dev — served by backend StaticFiles)
    location /images/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
