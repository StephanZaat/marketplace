server_tokens off;

# ── Compression ──────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 256;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

# ── Rate limiting zones ──────────────────────────────────────────────────────
# General API: 20 req/s per IP (burst 40)
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
# Auth endpoints: 5 req/min per IP
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── HTTP: ACME challenges + redirect to HTTPS ────────────────────────────────

server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Marketplace ──────────────────────────────────────────────────────

server {
    listen 443 ssl;
    http2 on;
    server_name marketplace.aw www.marketplace.aw;

    ssl_certificate     /etc/letsencrypt/live/marketplace.aw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketplace.aw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    resolver 127.0.0.11 valid=10s;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth endpoints — tight rate limit
    location /api/auth/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 1m;
        limit_req zone=auth burst=10 nodelay;
    }

    # General API
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20m;
        limit_req zone=api burst=40 nodelay;
    }

    # Uploaded images
    location /images/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # Frontend
    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.scw.cloud; font-src 'self'; connect-src 'self'; frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
}
