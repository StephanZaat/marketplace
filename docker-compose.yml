services:
  db:
    image: postgres:16-alpine
    container_name: marketplace_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-marketplace_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketplace_user} -d ${POSTGRES_DB:-marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketplace_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-marketplace_user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-marketplace}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: marketplace_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - VITE_FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}

  nginx:
    image: nginx:1.25-alpine
    container_name: marketplace_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketplace_test
    profiles: ["test"]
    working_dir: /app
    command: python -m pytest tests/ -v
    environment:
      DATABASE_URL: "sqlite:///./test.db"
      JWT_SECRET_KEY: "test-jwt-secret"
      SECRET_KEY: "test-secret"
      ALLOWED_ORIGINS: "http://localhost"
      TESTING: "1"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  uploads:
